name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check scripts tests

      - name: Type check (mypy)
        run: mypy scripts

      - name: Tests (pytest)
        run: pytest -v

      - name: Validate vencimento-guias JSONs
        run: python scripts/validate_vencimento_guias.py vencimento-guias/
