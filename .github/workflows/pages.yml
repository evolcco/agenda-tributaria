name: Deploy data to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages bundle
        run: |
          mkdir -p _site/data
          cp -r data/. _site/data/
          cp site/index.html _site/index.html
          # cabeçalho de cache razoável (GitHub Pages não permite custom headers,
          # mas ao copiar para _site garantimos que tudo é estático)
          ls -la _site/
          ls -la _site/data/ | head

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
